name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Build-time only — nothing here connects to a real database, this
      # just satisfies the "DATABASE_URL is not set" guard so the Next.js
      # build can evaluate route modules. No secrets required for CI.
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Generates .sst/platform/config.d.ts (referenced by sst.config.ts) —
      # a local codegen step based on the config's providers, no AWS
      # credentials needed.
      - run: bunx sst install
      - run: bun run lint
      - run: bunx tsc --noEmit
      - run: bun run build
